# Publish to PyPI when a GitHub Release is published.
#
# Uses PyPI "Trusted Publishing" (OIDC): PyPI is configured to trust this exact
# repository + workflow, so no API token or secret is stored anywhere. The user
# creates a GitHub Release (tagged e.g. v0.1.0) and this workflow builds and
# uploads the artifacts.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a full commit SHA (supply-chain safety):
      # a moving tag/branch could be repointed at malicious code, and this
      # workflow can publish releases and (below) mint an OIDC token.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # A named environment is where the Trusted Publisher is authorized on PyPI.
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
