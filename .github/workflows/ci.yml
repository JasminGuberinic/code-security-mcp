# Continuous integration: run the test suite on every push and pull request.
#
# The tests are intentionally hermetic — they use fake analyzers and hand-built
# SARIF/diff fixtures — so CI needs neither a JDK nor detekt. That keeps the
# pipeline fast and reliable, and is a direct payoff of the ports-and-adapters
# design (the domain and use cases are tested without any external tool).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to a full commit SHA (supply-chain safety); the trailing
      # comment records the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install the package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
