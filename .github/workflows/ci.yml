# Continuous integration: run the test suite on every push and pull request.
#
# The tests are intentionally hermetic — they use fake analyzers and hand-built
# SARIF/diff fixtures — so CI needs neither a JDK nor detekt. That keeps the
# pipeline fast and reliable, and is a direct payoff of the ports-and-adapters
# design (the domain and use cases are tested without any external tool).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
